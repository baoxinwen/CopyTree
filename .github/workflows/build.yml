name: Build CopyTree

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Compile check
        run: python -m compileall src

      - name: Build exe
        run: python -m PyInstaller copytree.spec --noconfirm

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CopyTree
          path: dist/CopyTree.exe
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag "dist/CopyTree.exe#CopyTree.exe" --clobber
          } else {
            gh release create $tag "dist/CopyTree.exe#CopyTree.exe" --title "CopyTree $tag" --notes "Automated build from GitHub Actions."
          }
